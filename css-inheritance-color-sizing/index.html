<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="avatar-wrap">
        <img
          src="https://placehold.co/120x120"
          alt="Profile avatar"
          class="avatar"
        />
      </div>

      <div class="profile">
        <h2 class="name">Darshan</h2>
        <p class="bio">
          Frontend developer learning CSS from scratch, one chapter at a time.
          Building real projects.
        </p>
      </div>

      <div class="tags">
        <span class="tag" data-topic="css">CSS</span>
        <span class="tag" data-topic="typescript">TypeScript</span>
        <span class="tag" data-topic="react">React</span>
      </div>

      <div class="socials">
        <a href="#">GitHub</a>
        <a href="#">Twitter</a>
        <a href="#">LinkedIn</a>
      </div>
    </div>
  </body>
</html>
